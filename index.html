<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>
<style>
body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
max-width:400px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}
h1{
color:#ff4d6d;
}
p{
font-size:18px;
line-height:1.6;
}
</style>
</head>
<body>
<div class="box">
<h1>I'm Sorry ❤️</h1>
<p>
I am really sorry. 🥺<br><br>
My intention was never to hurt you.<br>
I never wanted to hurt your feelings.<br>
Please forgive me.<br><br>
You mean a lot to me. ❤️
</p>
</div>
</body>
</html>
